<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#050816"><title>Nebula Vortex</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050816;color:#eafcff;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}canvas{display:block;width:100vw;height:100vh;background:#050816}.hud{position:fixed;inset:0;pointer-events:none;z-index:2}.top{position:absolute;top:max(8px,env(safe-area-inset-top));left:8px;right:8px;display:flex;gap:6px;align-items:center;justify-content:space-between;font-size:12px;font-weight:900;text-shadow:0 2px 10px #000}.pill{border:1px solid rgba(122,245,255,.33);background:rgba(8,21,46,.82);color:#eafcff;border-radius:999px;padding:7px 8px;white-space:nowrap}.tap{pointer-events:auto}.meter{position:absolute;left:14px;right:14px;bottom:calc(12px + env(safe-area-inset-bottom));height:14px;border:1px solid rgba(255,255,255,.22);border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,#ffd166,#ff4fd8,#52f7ff)}.bomb{position:absolute;right:14px;bottom:calc(34px + env(safe-area-inset-bottom));pointer-events:auto;border:1px solid rgba(255,209,102,.45);border-radius:16px;padding:12px 14px;background:rgba(255,209,102,.13);color:#fff;font-weight:1000}.bomb.ready{background:linear-gradient(135deg,#ffd166,#ff4fd8)}.panel{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;padding:22px;background:radial-gradient(circle at 50% 22%,rgba(99,49,197,.48),rgba(5,8,22,.94) 62%);pointer-events:auto}.panel.hidden{display:none}.card{width:min(560px,100%);box-sizing:border-box;border:1px solid rgba(117,236,255,.36);border-radius:28px;background:linear-gradient(180deg,rgba(7,21,45,.94),rgba(7,10,29,.93));box-shadow:0 22px 75px rgba(0,0,0,.65);padding:22px;text-align:center}.title{margin:0 0 8px;font-size:clamp(36px,10vw,60px);line-height:.9;font-weight:1000;letter-spacing:-.06em;background:linear-gradient(90deg,#fff,#7af5ff,#ff69d9,#ffd166);-webkit-background-clip:text;background-clip:text;color:transparent}.sub{color:#cae6f5;line-height:1.35}.tips{text-align:left;background:rgba(255,255,255,.07);border-radius:18px;padding:12px 14px;margin:14px 0;color:#dff8ff;font-size:14px;line-height:1.45}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border:0;border-radius:18px;padding:14px 12px;font-weight:1000;background:linear-gradient(135deg,#7af5ff,#ffd166);color:#06101f}.btn.dark{background:rgba(255,255,255,.10);color:#eafcff;border:1px solid rgba(255,255,255,.18)}.toast{position:absolute;left:50%;top:18%;transform:translateX(-50%);font-size:18px;font-weight:1000;text-shadow:0 3px 18px #000;opacity:0;transition:opacity .18s}.toast.on{opacity:1}@media(max-width:430px){.btns{grid-template-columns:1fr}.card{padding:18px}.top{font-size:11px}.pill{padding:6px 7px}}</style></head><body><canvas id="game"></canvas><div class="hud"><div class="top"><button class="pill tap" id="restart">RESTART</button><div class="pill" id="score">SCORE 0</div><div class="pill" id="wave">WAVE 1</div><div class="pill" id="hull">HULL 3</div></div><button class="bomb" id="bomb">BOMB</button><div class="meter"><div class="fill" id="meter"></div></div><div class="toast" id="toast">READY</div></div><div class="panel" id="panel"><div class="card"><h1 class="title" id="title">NEBULA VORTEX</h1><p class="sub" id="subtitle">Stable mobile build. Drag anywhere to dodge, auto-fire, collect cores, and use bombs when the meter is full.</p><div class="tips" id="tips"><b>Controls</b><br>Drag anywhere: move ship.<br>Shooting is automatic.<br>Tap BOMB when the meter is full.<br>Tap RESTART any time for a clean new run.</div><div class="btns"><button class="btn" id="play">LAUNCH</button><button class="btn dark" id="practice">PRACTICE</button></div></div></div><script>(function(){'use strict';var canvas=document.getElementById('game'),ctx=canvas.getContext('2d');var scoreEl=document.getElementById('score'),waveEl=document.getElementById('wave'),hullEl=document.getElementById('hull'),meterEl=document.getElementById('meter'),bombBtn=document.getElementById('bomb'),restartBtn=document.getElementById('restart');var panel=document.getElementById('panel'),titleEl=document.getElementById('title'),subEl=document.getElementById('subtitle'),tipsEl=document.getElementById('tips'),playBtn=document.getElementById('play'),practiceBtn=document.getElementById('practice'),toastEl=document.getElementById('toast');var W=1,H=1,D=1,raf=0,last=0,state='menu',practice=false,time=0,scroll=0,score=0,best=0,wave=1,spawnTimer=0,waveTimer=0,shake=0;var player=null,stars=[],shots=[],bullets=[],enemies=[],sparks=[],items=[];try{best=Number(localStorage.getItem('nebulaBest')||0)||0}catch(e){best=0}function rand(a,b){return a+Math.random()*(b-a)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function dist(a,b,c,d){var x=a-c,y=b-d;return Math.sqrt(x*x+y*y)}function resize(){D=Math.min(2,window.devicePixelRatio||1);W=window.innerWidth||320;H=window.innerHeight||560;canvas.width=Math.floor(W*D);canvas.height=Math.floor(H*D);canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(D,0,0,D,0,0);stars=[];for(var i=0;i<Math.max(70,Math.floor(W*H/6500));i++){stars.push({x:rand(0,W),y:rand(0,H),r:rand(.6,1.8),s:rand(35,155),a:rand(.35,1)})}}function toast(s){toastEl.textContent=s;toastEl.classList.add('on');clearTimeout(toastEl._t);toastEl._t=setTimeout(function(){toastEl.classList.remove('on')},850)}function hud(){scoreEl.textContent='SCORE '+Math.floor(score);waveEl.textContent='WAVE '+wave;hullEl.textContent='HULL '+(player?Math.max(0,player.hp):3);var b=player?player.bomb:0;meterEl.style.width=Math.floor(b)+'%';bombBtn.classList.toggle('ready',player&&player.bomb>=100&&state==='playing')}function showMenu(kind,msg){state=kind||'menu';panel.classList.remove('hidden');if(kind==='over'){titleEl.textContent='GAME OVER';subEl.textContent=msg||('Score: '+Math.floor(score)+' Best: '+best+' Wave: '+wave);tipsEl.innerHTML='<b>Clean restart ready</b><br>Tap Play Again or the RESTART button. This build fully resets the arrays and player state every run.';playBtn.textContent='PLAY AGAIN'}else if(kind==='error'){titleEl.textContent='GAME PAUSED';subEl.textContent=msg||'A browser error was caught before the page could freeze.';tipsEl.innerHTML='<b>Safe mode</b><br>Tap Restart Game to reload the page cleanly.';playBtn.textContent='RESTART GAME'}else{titleEl.textContent='NEBULA VORTEX';subEl.textContent='Stable mobile build. Drag anywhere to dodge, auto-fire, collect cores, and use bombs when the meter is full.';tipsEl.innerHTML='<b>Controls</b><br>Drag anywhere: move ship.<br>Shooting is automatic.<br>Tap BOMB when the meter is full.<br>Tap RESTART any time for a clean new run.';playBtn.textContent='LAUNCH'}hud()}function start(isPractice){practice=!!isPractice;state='playing';panel.classList.add('hidden');time=0;scroll=0;score=0;wave=1;spawnTimer=0;waveTimer=0;shake=0;shots.length=0;bullets.length=0;enemies.length=0;sparks.length=0;items.length=0;player={x:W/2,y:H*.78,tx:W/2,ty:H*.78,hp:3,r:13,inv:1.6,fire:0,bomb:practice?80:45,power:1,combo:1};hud();toast(practice?'PRACTICE':'WAVE 1')}function gameOver(){if(state!=='playing')return;state='over';bullets.length=0;enemies.length=0;items.length=0;boom(player.x,player.y,55,'#ff4fd8',250);best=Math.max(best,Math.floor(score));try{localStorage.setItem('nebulaBest',String(best))}catch(e){}showMenu('over','Score: '+Math.floor(score)+' Best: '+best+' Wave: '+wave)}function fail(e){if(state==='error')return;showMenu('error','A game error was caught: '+String(e&&e.message?e.message:e).slice(0,160))}window.onerror=function(m,u,l,c,e){fail(e||m);return true};window.onunhandledrejection=function(e){fail(e.reason||e);return true};function boom(x,y,n,color,speed){if(sparks.length>220)sparks.splice(0,sparks.length-160);for(var i=0;i<n;i++){var a=rand(0,Math.PI*2),v=rand(speed*.18,speed);sparks.push({x:x,y:y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:rand(.25,.85),r:rand(1.5,4),color:color})}}function spawnEnemy(){var k=Math.random()<.55?0:Math.random()<.78?1:2;var e={k:k,x:rand(30,W-30),y:-35,vx:rand(-30,30),vy:practice?70:80+wave*2,r:17,hp:16,value:100,fire:rand(.7,1.4),a:0};if(k===1){e.r=22;e.hp=34;e.vy=55;e.value=190}if(k===2){e.r=19;e.hp=26;e.vy=72;e.value=150}enemies.push(e)}function shootEnemy(e){var dx=player.x-e.x,dy=player.y-e.y,ang=Math.atan2(dy,dx);if(e.k===1){var count=practice?8:Math.min(18,9+wave);for(var i=0;i<count;i++){var a=i*Math.PI*2/count+time*.7;bullets.push({x:e.x,y:e.y,vx:Math.cos(a)*105,vy:Math.sin(a)*105,r:4.5,color:'#ffd166',g:false})}}else{for(var j=-1;j<=1;j++){var aa=ang+j*.16;bullets.push({x:e.x,y:e.y,vx:Math.cos(aa)*190,vy:Math.sin(aa)*190,r:4.5,color:e.k?'#7af5ff':'#ff4fd8',g:false})}}}function hit(){if(!player||player.inv>0||state!=='playing')return;player.hp--;player.inv=1.8;player.combo=1;bullets.length=0;shake=18;boom(player.x,player.y,30,'#ff4fd8',220);hud();if(player.hp<=0)gameOver();else toast('HIT')}function useBomb(){if(state!=='playing'||!player||player.bomb<100)return;player.bomb=0;shake=18;score+=bullets.length*10;bullets.length=0;for(var i=0;i<enemies.length;i++){enemies[i].hp-=110;boom(enemies[i].x,enemies[i].y,7,'#ffd166',120)}toast('NOVA BOMB');hud()}function point(e){var q=e.touches?e.touches[0]:e;return{x:q.clientX,y:q.clientY}}function move(e){if(state!=='playing'||!player)return;if(e.cancelable!==false)e.preventDefault();var q=point(e);player.tx=q.x;player.ty=q.y}canvas.addEventListener('pointerdown',move);canvas.addEventListener('pointermove',move);canvas.addEventListener('touchstart',move,{passive:false});canvas.addEventListener('touchmove',move,{passive:false});function bind(el,fn){var busy=false;function go(e){if(e){e.preventDefault();e.stopPropagation()}if(busy)return;busy=true;setTimeout(function(){busy=false},120);fn()}el.addEventListener('click',go);el.addEventListener('touchend',go,{passive:false})}bind(playBtn,function(){if(state==='error')location.reload();else start(false)});bind(practiceBtn,function(){if(state==='error')location.reload();else start(true)});bind(restartBtn,function(){start(false)});bind(bombBtn,useBomb);window.addEventListener('resize',resize);window.addEventListener('keydown',function(e){if(e.key==='r'||e.key==='R')start(false);if((e.key===' '||e.key==='b'||e.key==='B')&&state==='playing')useBomb()});function update(dt){if(state!=='playing'||!player)return;time+=dt;scroll+=dt*(140+wave*8);player.inv-=dt;player.tx=clamp(player.tx,22,W-22);player.ty=clamp(player.ty,60,H-42);player.x+=(player.tx-player.x)*Math.min(1,dt*12);player.y+=(player.ty-player.y)*Math.min(1,dt*12);player.fire-=dt;player.bomb=clamp(player.bomb+dt*(practice?8:3.2),0,100);if(player.fire<=0){player.fire=clamp(.16-player.power*.015,.075,.16);var sp=Math.min(3,Math.floor(player.power));for(var s=-sp;s<=sp;s++){shots.push({x:player.x+s*8,y:player.y-18,vx:s*18,vy:-620,r:s?3:4,d:8+player.power*2})}}spawnTimer-=dt;waveTimer+=dt;if(spawnTimer<=0){spawnTimer=practice?1.05:clamp(1.15-wave*.06,.42,1.15);if(enemies.length<18)spawnEnemy()}if(waveTimer>24){wave++;waveTimer=0;toast('WAVE '+wave)}for(var i=shots.length-1;i>=0;i--){var sh=shots[i];sh.x+=sh.vx*dt;sh.y+=sh.vy*dt;if(sh.y<-40||sh.x<-50||sh.x>W+50)shots.splice(i,1)}for(var ei=enemies.length-1;ei>=0;ei--){var en=enemies[ei];en.a+=dt;en.x+=en.vx*dt+Math.sin(time*2+ei)*18*dt;en.y+=en.vy*dt;en.fire-=dt;if(en.fire<=0){en.fire=practice?1.4:rand(.9,1.4);shootEnemy(en)}for(var sj=shots.length-1;sj>=0;sj--){var so=shots[sj];if(dist(so.x,so.y,en.x,en.y)<so.r+en.r){en.hp-=so.d;shots.splice(sj,1);boom(so.x,so.y,2,'#7af5ff',55);if(en.hp<=0)break}}if(en.hp<=0){score+=en.value*player.combo;player.combo=clamp(player.combo+.06,1,6);player.bomb=clamp(player.bomb+7,0,100);boom(en.x,en.y,20,'#ff4fd8',170);if(Math.random()<.24)items.push({x:en.x,y:en.y,r:10,type:Math.random()<.7?'power':'bomb'});enemies.splice(ei,1);continue}if(en.y>H+80){enemies.splice(ei,1);continue}if(dist(player.x,player.y,en.x,en.y)<player.r+en.r*.72)hit()}for(var bi=bullets.length-1;bi>=0;bi--){var b=bullets[bi];b.x+=b.vx*dt;b.y+=b.vy*dt;if(b.x<-70||b.x>W+70||b.y<-90||b.y>H+90){bullets.splice(bi,1);continue}var dd=dist(player.x,player.y,b.x,b.y);if(dd<player.r+b.r*.85){bullets.splice(bi,1);hit();continue}if(!b.g&&dd<player.r+22){b.g=true;score+=20*player.combo;player.combo=clamp(player.combo+.02,1,6);player.bomb=clamp(player.bomb+1.1,0,100)}}for(var pi=items.length-1;pi>=0;pi--){var it=items[pi];it.y+=92*dt;if(dist(player.x,player.y,it.x,it.y)<player.r+it.r+7){if(it.type==='power')player.power=clamp(player.power+.4,1,5);else player.bomb=clamp(player.bomb+30,0,100);boom(it.x,it.y,14,it.type==='power'?'#7af5ff':'#ffd166',110);items.splice(pi,1)}else if(it.y>H+40)items.splice(pi,1)}hud()}function draw(){ctx.save();shake*=.86;var sx=shake?rand(-shake,shake):0,sy=shake?rand(-shake,shake):0;ctx.clearRect(0,0,W,H);ctx.translate(sx,sy);var bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#09051f');bg.addColorStop(.58,'#07162f');bg.addColorStop(1,'#050816');ctx.fillStyle=bg;ctx.fillRect(-40,-40,W+80,H+80);for(var i=0;i<stars.length;i++){var st=stars[i],y=(st.y+scroll*st.s/90)%(H+8)-4;ctx.globalAlpha=st.a;ctx.fillStyle=st.s>100?'#ffffff':'#7af5ff';ctx.fillRect(st.x,y,st.r,st.r*(1+st.s/80))}ctx.globalAlpha=1;for(var it=0;it<items.length;it++){var o=items[it];ctx.save();ctx.translate(o.x,o.y);ctx.rotate(time*4);ctx.strokeStyle=o.type==='power'?'#7af5ff':'#ffd166';ctx.lineWidth=3;ctx.strokeRect(-o.r,-o.r,o.r*2,o.r*2);ctx.restore()}ctx.fillStyle='#eaffff';for(var s=0;s<shots.length;s++){var sh=shots[s];ctx.beginPath();ctx.arc(sh.x,sh.y,sh.r,0,Math.PI*2);ctx.fill()}for(var e=0;e<enemies.length;e++){var en=enemies[e];ctx.save();ctx.translate(en.x,en.y);ctx.rotate(en.a);ctx.fillStyle=en.k===1?'#ffd166':en.k===2?'#7af5ff':'#ff4fd8';ctx.beginPath();for(var p=0;p<6;p++){var a=p*Math.PI*2/6;ctx.lineTo(Math.cos(a)*en.r,Math.sin(a)*en.r)}ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(255,255,255,.75)';ctx.lineWidth=2;ctx.stroke();ctx.restore()}for(var bl=0;bl<bullets.length;bl++){var bu=bullets[bl];ctx.fillStyle=bu.color;ctx.beginPath();ctx.arc(bu.x,bu.y,bu.r,0,Math.PI*2);ctx.fill()}if(player&&(state==='playing'||state==='over')){ctx.save();ctx.translate(player.x,player.y);if(player.inv>0&&state==='playing'&&Math.floor(time*18)%2===0)ctx.globalAlpha=.35;ctx.fillStyle='#eafcff';ctx.beginPath();ctx.moveTo(0,-20);ctx.lineTo(13,13);ctx.lineTo(0,6);ctx.lineTo(-13,13);ctx.closePath();ctx.fill();ctx.fillStyle='#52f7ff';ctx.beginPath();ctx.moveTo(0,-9);ctx.lineTo(5,8);ctx.lineTo(0,5);ctx.lineTo(-5,8);ctx.closePath();ctx.fill();ctx.fillStyle='#ff4fd8';ctx.fillRect(-5,12,10,8);ctx.restore()}for(var sp=sparks.length-1;sp>=0;sp--){var pa=sparks[sp];pa.x+=pa.vx/60;pa.y+=pa.vy/60;pa.vx*=.985;pa.vy*=.985;pa.life-=.018;ctx.globalAlpha=clamp(pa.life,0,1);ctx.fillStyle=pa.color;ctx.beginPath();ctx.arc(pa.x,pa.y,pa.r*Math.max(.15,pa.life),0,Math.PI*2);ctx.fill();if(pa.life<=0)sparks.splice(sp,1)}ctx.globalAlpha=1;ctx.restore()}function loop(now){try{var dt=Math.min(.033,(now-last)/1000||.016);last=now;update(dt);draw()}catch(e){fail(e)}raf=requestAnimationFrame(loop)}resize();hud();raf=requestAnimationFrame(loop);})();</script></body></html>
